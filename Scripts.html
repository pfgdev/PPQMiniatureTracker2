<script>
  (function () {
    const desktopMq = window.matchMedia("(min-width: 980px)");
    const FILTER_OPTIONS = {
      sizes: ["Tiny", "Small", "Medium", "Large", "Huge", "Gargantuan"],
      creatureTypes: [
        "Aberration",
        "Beast",
        "Celestial",
        "Construct",
        "Dragon",
        "Elemental",
        "Fey",
        "Fiend",
        "Giant",
        "Humanoid",
        "Monstrosity",
        "Ooze",
        "Plant",
        "Undead",
        "n/a"
      ],
      roles: ["Melee", "Ranged", "Spellcaster", "Support", "Tank", "Boss", "Minion", "NPC", "Other", "Various", "n/a"],
      sexes: ["Female", "Male", "n/a"],
      races: [
        "Aasimar",
        "Bugbear",
        "Dragonborn",
        "Drow",
        "Dwarf",
        "Elf",
        "Gnoll",
        "Gnome",
        "Goblin",
        "Goliath",
        "Half-Elf",
        "Half-Orc",
        "Halfling",
        "Hobgoblin",
        "Human",
        "Kobold",
        "Lizardfolk",
        "Orc",
        "Tiefling",
        "Tortle",
        "Yuan-ti",
        "other",
        "n/a"
      ]
    };

    const state = {
      groups: INITIAL_STATE.groups.map(enrichGroup),
      locations: INITIAL_STATE.locations.slice(),
      search: "",
      locationFilter: "all",
      locationMenuOpen: false,
      locationMenuSearch: "",
      filtersApplied: createEmptyFilterState(),
      openFacetKey: "",
      selectedRootId: "",
      draftLocations: {},
      detailPointerDownInside: false
    };

    let root;
    let workspaceNode;
    let summaryLaneNode;
    let listHeaderNoteNode;
    let searchInputNode;
    let locationComboboxNode;
    let locationTriggerNode;
    let locationLabelNode;
    let locationClearNode;
    let locationPopoverNode;
    let locationSearchNode;
    let locationOptionsNode;
    let facetShellNode;
    let facetBarNode;
    let facetPopoverNode;
    let facetPopoverTitleNode;
    let facetPopoverClearNode;
    let facetPopoverBodyNode;
    let listStageNode;
    let tableScrollNode;
    let detailPanelNode;
    let detailStageNode;
    let detailHeaderTitleNode;
    let detailHeaderTagsNode;
    let detailCloseButtonNode;
    let detailScrollNode;
    let detailEmptyNode;
    let detailContentNode;
    let facetHideTimer = null;

    initMiniV2();

    function initMiniV2() {
      buildShell();
      bindNodes();
      renderLocationFilter();
      renderAll();
      bindEvents();
      window.addEventListener("resize", syncDesktopLayoutMetrics);
      new ResizeObserver(syncDesktopLayoutMetrics).observe(root);
    }

    function buildShell() {
      document.getElementById("app").innerHTML = `
        <div id="miniV2Root" class="mini-v2">
          <section class="v2-card mini-v2-top-card">
            <div class="v2-card-header">PPQ Miniature Tracker</div>
            <div class="v2-card-body mini-v2-top-card-body">
              <p class="mini-v2-top-note">Work-in-Progress. This space will be used to submit new miniature entries.</p>
              <div id="miniV2SummaryLane" class="mini-v2-summary-lane"></div>
            </div>
          </section>

          <div class="mini-v2-workspace">
            <section class="v2-card mini-v2-table-card">
              <div id="miniV2ListStage" class="mini-v2-list-stage">
                <div class="v2-card-header mini-v2-list-header">
                  <span>Browse Minis</span>
                  <span id="miniV2ListHeaderNote" class="mini-v2-list-header-note"></span>
                </div>
                <div class="v2-card-body mini-v2-table-body">
                  <div class="mini-v2-controls">
                    <div class="mini-v2-search-row">
                      <div class="mini-v2-field">
                        <input id="miniV2SearchInput" type="search" placeholder="Search name, sticker, or details...">
                      </div>
                      <div class="mini-v2-field">
                        <div id="miniV2LocationCombobox" class="mini-v2-combobox">
                          <button
                            id="miniV2LocationTrigger"
                            class="mini-v2-combobox-trigger"
                            type="button"
                            data-action="toggle-location-menu"
                            aria-haspopup="listbox"
                            aria-expanded="false"
                            aria-controls="miniV2LocationPopover"
                          >
                            <span id="miniV2LocationLabel" class="mini-v2-combobox-label">All locations</span>
                            <span class="mini-v2-combobox-caret" aria-hidden="true">▾</span>
                          </button>
                          <button
                            id="miniV2LocationClear"
                            class="mini-v2-combobox-clear"
                            type="button"
                            data-action="clear-location"
                            aria-label="Clear location filter"
                            hidden
                          >
                            ×
                          </button>
                          <div id="miniV2LocationPopover" class="mini-v2-combobox-popover" hidden>
                            <div class="mini-v2-combobox-search-wrap">
                              <input id="miniV2LocationSearch" class="mini-v2-combobox-search" type="search" placeholder="Search locations...">
                            </div>
                            <div id="miniV2LocationOptions" class="mini-v2-combobox-options" role="listbox" aria-label="Locations"></div>
                          </div>
                        </div>
                      </div>
                      <button class="button mini-v2-action-btn" type="button" data-action="clear-filters">Clear</button>
                    </div>
                    <div id="miniV2FacetShell" class="mini-v2-facet-shell">
                      <div id="miniV2FacetBar" class="mini-v2-facet-row"></div>
                      <div id="miniV2FacetPopover" class="mini-v2-facet-popover" hidden>
                        <div class="mini-v2-facet-popover-header">
                          <div id="miniV2FacetPopoverTitle" class="mini-v2-facet-popover-title"></div>
                          <button
                            id="miniV2FacetPopoverClear"
                            class="button mini-v2-facet-popover-link"
                            type="button"
                            data-action="clear-open-facet"
                            disabled
                          >
                            Clear
                          </button>
                        </div>
                        <div id="miniV2FacetPopoverBody" class="mini-v2-facet-popover-body"></div>
                      </div>
                    </div>
                  </div>
                  <div id="miniV2TableScroll" class="mini-v2-table-scroll"></div>
                </div>
              </div>
            </section>

            <aside id="miniV2DetailPanel" class="v2-card mini-v2-detail-card">
              <div id="miniV2DetailStage" class="mini-v2-detail-stage">
                <div class="v2-card-header mini-v2-detail-header">
                  <div class="mini-v2-detail-header-main">
                    <span id="miniV2DetailHeaderTitle">Mini Details</span>
                    <div id="miniV2DetailHeaderTags" class="mini-v2-detail-tag-row"></div>
                  </div>
                  <div class="mini-v2-detail-header-actions">
                    <button id="miniV2DetailCloseButton" class="button mini-v2-detail-close" type="button" data-action="close-detail">Close</button>
                  </div>
                </div>
                <div class="v2-card-body">
                  <div id="miniV2DetailScroll" class="mini-v2-detail-scroll">
                    <div id="miniV2DetailEmpty" class="mini-v2-detail-empty">Select a miniature to view its details and move individual copies.</div>
                    <div id="miniV2DetailContent" hidden></div>
                  </div>
                </div>
              </div>
            </aside>
          </div>
        </div>
      `;
    }

    function bindNodes() {
      root = document.getElementById("miniV2Root");
      workspaceNode = root.querySelector(".mini-v2-workspace");
      summaryLaneNode = document.getElementById("miniV2SummaryLane");
      listHeaderNoteNode = document.getElementById("miniV2ListHeaderNote");
      searchInputNode = document.getElementById("miniV2SearchInput");
      locationComboboxNode = document.getElementById("miniV2LocationCombobox");
      locationTriggerNode = document.getElementById("miniV2LocationTrigger");
      locationLabelNode = document.getElementById("miniV2LocationLabel");
      locationClearNode = document.getElementById("miniV2LocationClear");
      locationPopoverNode = document.getElementById("miniV2LocationPopover");
      locationSearchNode = document.getElementById("miniV2LocationSearch");
      locationOptionsNode = document.getElementById("miniV2LocationOptions");
      facetShellNode = document.getElementById("miniV2FacetShell");
      facetBarNode = document.getElementById("miniV2FacetBar");
      facetPopoverNode = document.getElementById("miniV2FacetPopover");
      facetPopoverTitleNode = document.getElementById("miniV2FacetPopoverTitle");
      facetPopoverClearNode = document.getElementById("miniV2FacetPopoverClear");
      facetPopoverBodyNode = document.getElementById("miniV2FacetPopoverBody");
      locationTriggerNode.querySelector(".mini-v2-combobox-caret").textContent = "";
      locationClearNode.textContent = "x";
      listStageNode = document.getElementById("miniV2ListStage");
      tableScrollNode = document.getElementById("miniV2TableScroll");
      detailPanelNode = document.getElementById("miniV2DetailPanel");
      detailStageNode = document.getElementById("miniV2DetailStage");
      detailHeaderTitleNode = document.getElementById("miniV2DetailHeaderTitle");
      detailHeaderTagsNode = document.getElementById("miniV2DetailHeaderTags");
      detailCloseButtonNode = document.getElementById("miniV2DetailCloseButton");
      detailScrollNode = document.getElementById("miniV2DetailScroll");
      detailEmptyNode = document.getElementById("miniV2DetailEmpty");
      detailContentNode = document.getElementById("miniV2DetailContent");
    }

    function bindEvents() {
      root.addEventListener("click", handleRootClick);
      root.addEventListener("input", handleRootInput);
      root.addEventListener("change", handleRootChange);
      root.addEventListener("keydown", handleRootKeydown);
      document.addEventListener("click", handleDocumentClick);
      document.addEventListener("pointerdown", handleDocumentPointerDown, true);
    }

    function enrichGroup(group) {
      const copies = group.copies.map(copy => ({ ...copy }));
      const available = copies.filter(copy => copy.currentLocation === copy.home).length;
      const total = copies.length;
      const checkedOut = total - available;
      const needsStickers = copies.some(copy => !copy.sticker);
      const searchText = [
        group.name,
        group.rootId,
        group.home,
        group.size,
        group.creatureType,
        group.sex,
        group.race,
        group.role,
        group.set,
        group.setNumber,
        group.notes
      ]
        .concat(copies.map(copy => [copy.id, copy.sticker, copy.currentLocation].join(" ")))
        .join(" ")
        .toLowerCase();

      return { ...group, copies, available, total, checkedOut, needsStickers, searchText };
    }

    function renderAll() {
      ensureSelectionVisibility();
      const selectedGroup = getSelectedGroup();
      root.classList.toggle("mini-v2-has-detail", !!selectedGroup);
      renderSummaryLane();
      renderListHeader();
      renderLocationFilter();
      renderFacetBar();
      renderFacetFlyout();
      renderTable();
      renderDetail();
      requestAnimationFrame(syncDesktopLayoutMetrics);
    }

    function renderAllPreservingScroll(existingState) {
      const scrollState = existingState || captureScrollState();
      renderAll();
      restoreScrollState(scrollState);
      return scrollState;
    }

    function renderSummaryLane() {
      const filtered = getFilteredGroups();
      const stickerWork = state.groups.filter(group => group.needsStickers).length;

      summaryLaneNode.innerHTML = `
        <span class="mini-v2-chip is-primary">Mock Data</span>
        <span class="mini-v2-chip">Groups ${state.groups.length}</span>
        <span class="mini-v2-chip">Visible ${filtered.length}</span>
        <span class="mini-v2-chip ${stickerWork ? "is-warn" : ""}">Sticker Work ${stickerWork}</span>
      `;
    }

    function renderListHeader() {
      const filtered = getFilteredGroups();
      listHeaderNoteNode.textContent = filtered.length === 1
        ? "1 miniature shown"
        : `${filtered.length} miniatures shown`;
    }

    function renderLocationFilter() {
      searchInputNode.value = state.search;
      locationComboboxNode.classList.toggle("is-open", state.locationMenuOpen);
      locationLabelNode.textContent = state.locationFilter === "all" ? "All locations" : state.locationFilter;
      locationTriggerNode.setAttribute("aria-expanded", state.locationMenuOpen ? "true" : "false");
      locationTriggerNode.classList.toggle("is-active", state.locationFilter !== "all");
      locationTriggerNode.classList.toggle("is-open", state.locationMenuOpen);
      locationClearNode.hidden = true;
      locationPopoverNode.hidden = !state.locationMenuOpen;
      locationSearchNode.value = state.locationMenuSearch;

      const query = state.locationMenuSearch.trim().toLowerCase();
      const matchingLocations = state.locations.filter(location => location.toLowerCase().includes(query));
      const options = [
        {
          value: "all",
          label: "All locations"
        }
      ].concat(matchingLocations.map(location => ({
        value: location,
        label: location
      })));

      if (!options.length) {
        locationOptionsNode.innerHTML = `<div class="mini-v2-combobox-empty">No locations found.</div>`;
        return;
      }

      locationOptionsNode.innerHTML = options.map(option => `
        <button
          class="mini-v2-combobox-option ${state.locationFilter === option.value ? "is-selected" : ""}"
          type="button"
          role="option"
          aria-selected="${state.locationFilter === option.value ? "true" : "false"}"
          data-action="set-location-filter"
          data-location-value="${escapeHtml(option.value)}"
        >
          <span class="mini-v2-combobox-option-label">${escapeHtml(option.label)}</span>
          ${state.locationFilter === option.value ? '<span class="mini-v2-combobox-option-check" aria-hidden="true">✓</span>' : ""}
        </button>
      `).join("");
    }

    function renderFacetBar() {
      const facetConfigs = getFacetConfigs();
      facetBarNode.innerHTML = facetConfigs.map(config => renderFacetButton(config)).join("");
    }

    function renderFacetButton(config) {
      const count = getFacetCount(config.key);
      const isActive = count > 0;
      const isOpen = state.openFacetKey === config.key;

      return `
        <button
          class="mini-v2-facet-btn ${isActive ? "is-active" : ""} ${isOpen ? "is-open" : ""}"
          type="button"
          data-action="toggle-facet"
          data-facet-key="${escapeHtml(config.key)}"
          aria-pressed="${isActive ? "true" : "false"}"
          aria-expanded="${isOpen ? "true" : "false"}"
        >
          <span class="mini-v2-facet-label">${escapeHtml(config.label)}</span>
          ${count > 1 ? `<span class="mini-v2-facet-count">${count}</span>` : ""}
        </button>
      `;
    }

    function getFacetCount(facetKey) {
      if (facetKey === "more") {
        return state.filtersApplied.roles.length
          + (state.filtersApplied.paintedOnly ? 1 : 0)
          + (state.filtersApplied.needsStickersOnly ? 1 : 0);
      }

      const values = state.filtersApplied[facetKey];
      return Array.isArray(values) ? values.length : 0;
    }

    function clearOpenFacetSelections() {
      if (state.openFacetKey === "more") {
        state.filtersApplied.roles = [];
        state.filtersApplied.paintedOnly = false;
        state.filtersApplied.needsStickersOnly = false;
        return;
      }

      if (!state.openFacetKey) return;
      if (Array.isArray(state.filtersApplied[state.openFacetKey])) {
        state.filtersApplied[state.openFacetKey] = [];
      }
    }

    function toggleAppliedFacetValue(kind, value) {
      if (!kind || !value || !Array.isArray(state.filtersApplied[kind])) return;
      const nextValues = state.filtersApplied[kind].slice();
      const existingIndex = nextValues.indexOf(value);
      if (existingIndex >= 0) {
        nextValues.splice(existingIndex, 1);
      } else {
        nextValues.push(value);
      }
      state.filtersApplied[kind] = nextValues;
    }

    function toggleAppliedFacetFlag(flagKey) {
      if (!(flagKey in state.filtersApplied)) return;
      state.filtersApplied[flagKey] = !state.filtersApplied[flagKey];
    }

    function renderFacetFlyout() {
      if (!facetPopoverNode) return;

      const activeConfig = getFacetConfigs().find(config => config.key === state.openFacetKey) || null;
      facetShellNode.classList.toggle("has-open-facet", !!activeConfig);

      if (activeConfig) {
        const activeCount = getFacetCount(activeConfig.key);
        facetPopoverTitleNode.textContent = activeConfig.label;
        facetPopoverClearNode.disabled = !activeCount;
        facetPopoverBodyNode.innerHTML = renderFacetFlyoutBody(activeConfig);

        if (facetHideTimer) {
          clearTimeout(facetHideTimer);
          facetHideTimer = null;
        }

        if (facetPopoverNode.hidden) {
          facetPopoverNode.hidden = false;
          requestAnimationFrame(() => {
            facetPopoverNode.classList.add("is-visible");
          });
        } else {
          facetPopoverNode.classList.add("is-visible");
        }
        return;
      }

      facetPopoverNode.classList.remove("is-visible");
      if (facetHideTimer) {
        clearTimeout(facetHideTimer);
      }
      facetHideTimer = setTimeout(() => {
        if (!state.openFacetKey) {
          facetPopoverNode.hidden = true;
        }
        facetHideTimer = null;
      }, 180);
    }

    function renderFacetFlyoutBody(config) {
      if (config.key === "sizes") {
        return renderFacetTileGrid("sizes", FILTER_OPTIONS.sizes, state.filtersApplied.sizes, "is-three-col");
      }

      if (config.key === "creatureTypes") {
        return renderFacetTileGrid("creatureTypes", FILTER_OPTIONS.creatureTypes, state.filtersApplied.creatureTypes, "is-three-col");
      }

      if (config.key === "races") {
        return renderFacetTileGrid("races", FILTER_OPTIONS.races, state.filtersApplied.races, "is-three-col");
      }

      if (config.key === "sexes") {
        return renderFacetTileGrid("sexes", FILTER_OPTIONS.sexes, state.filtersApplied.sexes, "is-three-col");
      }

      if (config.key === "more") {
        return `
          <div class="mini-v2-facet-more">
            ${renderFacetGroup("Role", renderFacetTileGrid("roles", FILTER_OPTIONS.roles, state.filtersApplied.roles, "is-three-col"))}
            ${renderFacetGroup("Collection", `
              <div class="mini-v2-facet-tile-grid is-two-col">
                ${renderFacetFlagTile("paintedOnly", "Painted only", state.filtersApplied.paintedOnly)}
                ${renderFacetFlagTile("needsStickersOnly", "Needs stickers only", state.filtersApplied.needsStickersOnly)}
              </div>
            `)}
          </div>
        `;
      }

      return "";
    }

    function getFacetConfigs() {
      return [
        { key: "sizes", label: "Size" },
        { key: "creatureTypes", label: "Type" },
        { key: "races", label: "Race" },
        { key: "sexes", label: "Sex" },
        { key: "more", label: "More" }
      ];
    }

    function renderFacetGroup(label, bodyMarkup) {
      return `
        <section class="mini-v2-facet-group">
          <div class="mini-v2-facet-group-label">${escapeHtml(label)}</div>
          ${bodyMarkup}
        </section>
      `;
    }

    function renderFacetTileGrid(kind, options, selectedValues, layoutClass) {
      return `
        <div class="mini-v2-facet-tile-grid ${layoutClass}">
          ${options.map(option => renderFacetTile(kind, option, selectedValues.includes(option))).join("")}
        </div>
      `;
    }

    function renderFacetTile(kind, value, isSelected) {
      return `
        <button
          class="mini-v2-facet-tile ${isSelected ? "is-selected" : ""}"
          type="button"
          data-action="toggle-facet-value"
          data-facet-kind="${escapeHtml(kind)}"
          data-facet-value="${escapeHtml(value)}"
          aria-pressed="${isSelected ? "true" : "false"}"
        >
          <span class="mini-v2-facet-tile-check" aria-hidden="true">${isSelected ? "x" : ""}</span>
          <span class="mini-v2-facet-tile-label">${escapeHtml(value)}</span>
        </button>
      `;
    }

    function renderFacetFlagTile(flagKey, label, enabled) {
      return `
        <button
          class="mini-v2-facet-tile ${enabled ? "is-selected" : ""}"
          type="button"
          data-action="toggle-facet-flag"
          data-facet-flag="${escapeHtml(flagKey)}"
          aria-pressed="${enabled ? "true" : "false"}"
        >
          <span class="mini-v2-facet-tile-check" aria-hidden="true">${enabled ? "x" : ""}</span>
          <span class="mini-v2-facet-tile-label">${escapeHtml(label)}</span>
        </button>
      `;
    }

    function renderTable() {
      const groups = getFilteredGroups();

      if (!groups.length) {
        tableScrollNode.innerHTML = `
          <div class="mini-v2-list-wrap">
            <div class="mini-v2-empty">No miniatures match those filters.</div>
          </div>
        `;
        return;
      }

      const rows = groups.map(group => {
        const status = getStatusKey(group);
        return `
          <tr class="mini-v2-row ${group.rootId === state.selectedRootId ? "is-selected" : ""}" data-group-id="${escapeHtml(group.rootId)}" tabindex="0">
            <td><span class="mini-v2-count ${statusClass(status)}">${group.available}</span></td>
            <td><div class="mini-v2-name">${escapeHtml(group.name)}</div></td>
            <td>${escapeHtml(group.home)}</td>
            <td>${escapeHtml(group.size)}</td>
            <td>${escapeHtml(group.creatureType)}</td>
          </tr>
        `;
      }).join("");

      tableScrollNode.innerHTML = `
        <div class="mini-v2-list-wrap">
          <table class="mini-v2-table mini-v2-browse-table" aria-label="Miniature inventory">
            <thead>
              <tr>
                <th>Avail</th>
                <th>Name</th>
                <th>Home</th>
                <th>Size</th>
                <th>Type</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function renderDetail() {
      const group = getSelectedGroup();

      if (!group) {
        detailHeaderTitleNode.textContent = "Mini Details";
        detailHeaderTagsNode.innerHTML = "";
        detailEmptyNode.hidden = false;
        detailContentNode.hidden = true;
        detailCloseButtonNode.disabled = true;
        return;
      }

      const dirtyCount = group.copies.filter(isDirty).length;
      detailHeaderTitleNode.textContent = group.name;
      detailHeaderTagsNode.innerHTML = [
        renderDetailTag(getStatusLabel(group), statusClass(getStatusKey(group))),
        dirtyCount ? renderDetailTag(`Unsaved ${dirtyCount}`, "is-warn") : "",
        group.needsStickers ? renderDetailTag("Sticker Work", "is-warn") : ""
      ].join("");
      detailCloseButtonNode.disabled = false;
      detailEmptyNode.hidden = true;
      detailContentNode.hidden = false;

      detailContentNode.innerHTML = `
        <div class="mini-v2-detail-panel">
          <section class="mini-v2-stat-grid">
            ${renderStatCard("Home", group.home)}
            ${renderStatCard("Available", `<span class="mini-v2-count ${statusClass(getStatusKey(group))}">${group.available}</span>`)}
            ${renderStatCard("Total", String(group.total))}
            ${renderStatCard("Checked Out", String(group.checkedOut))}
          </section>

          <section class="mini-v2-meta-grid">
            ${renderReadCard("Size", group.size)}
            ${renderReadCard("Creature Type", group.creatureType)}
            ${renderReadCard("Sex", group.sex)}
            ${renderReadCard("Race", group.race || "n/a")}
            ${renderReadCard("Role", group.role || "n/a")}
            ${renderReadCard("Paint", group.paint ? "Painted" : "Unpainted")}
            ${renderReadCard("Set", group.set || "n/a")}
            ${renderReadCard("Set #", group.setNumber || "n/a")}
          </section>

          <section class="mini-v2-note-card">
            <div class="mini-v2-note-label">Notes</div>
            <div class="mini-v2-note-body">${escapeHtml(group.notes || "No notes yet.")}</div>
          </section>

          <section class="mini-v2-copy-card">
            <div class="mini-v2-copy-header">
              <div>
                <div class="mini-v2-copy-title">Physical Copies</div>
                <div class="mini-v2-copy-header-copy">Use the sticker-aware copy list below to stage location changes before saving.</div>
              </div>
              <div class="mini-v2-copy-actions">
                <button class="button mini-v2-copy-btn" type="button" data-action="reset-changes">Reset Changes</button>
                <button class="button mini-v2-copy-btn mini-v2-secondary" type="button" data-action="set-all-home">Set All Home</button>
                <button class="button mini-v2-copy-btn mini-v2-primary" type="button" data-action="save-changes">Save Mock Changes</button>
              </div>
            </div>
            <div class="mini-v2-copy-wrap">
              <table class="mini-v2-table mini-v2-copy-table" aria-label="Physical copies">
                <thead>
                  <tr>
                    <th>Sticker</th>
                    <th>Current Location</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>${group.copies.map(renderCopyRow).join("")}</tbody>
              </table>
            </div>
          </section>
        </div>
      `;
    }

    function renderStatusBadge(group) {
      const status = getStatusKey(group);
      return `<span class="mini-v2-badge ${statusClass(status)}">${escapeHtml(getStatusLabel(group))}</span>`;
    }

    function renderDetailTag(label, className) {
      return `<span class="mini-v2-detail-tag ${className}">${escapeHtml(label)}</span>`;
    }

    function renderStatCard(label, valueMarkup) {
      return `
        <div class="mini-v2-stat-card">
          <div class="mini-v2-stat-label">${escapeHtml(label)}</div>
          <div class="mini-v2-stat-value">${valueMarkup}</div>
        </div>
      `;
    }

    function renderReadCard(label, value) {
      return `
        <div class="mini-v2-read-card">
          <div class="mini-v2-field-label">${escapeHtml(label)}</div>
          <div class="mini-v2-read-value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderCopyRow(copy) {
      const effectiveLocation = getEffectiveLocation(copy);
      const away = effectiveLocation !== copy.home;
      const dirty = isDirty(copy);
      const statusMarkup = dirty
        ? '<span class="mini-v2-copy-status is-dirty">Unsaved</span>'
        : away
          ? '<span class="mini-v2-copy-status is-away">Away</span>'
          : '<span class="mini-v2-copy-status is-home">Home</span>';

      return `
        <tr class="mini-v2-copy-row ${away ? "is-away" : ""} ${dirty ? "is-dirty" : ""}">
          <td>${escapeHtml(copy.sticker || "Needs sticker")}</td>
          <td>
            <select class="mini-v2-copy-select" data-copy-id="${escapeHtml(copy.id)}">
              ${renderCopyLocationOptions(copy, effectiveLocation)}
            </select>
          </td>
          <td>${statusMarkup}</td>
        </tr>
      `;
    }

    function renderCopyLocationOptions(copy, effectiveLocation) {
      return [`<option value="__RETURN_HOME__"${effectiveLocation === copy.home ? " selected" : ""}>Return Home</option>`]
        .concat(state.locations.map(location => `
          <option value="${escapeHtml(location)}"${effectiveLocation === location ? " selected" : ""}>${escapeHtml(location)}</option>
        `))
        .join("");
    }

    function handleRootClick(event) {
      const clickTarget = event.target instanceof Element ? event.target : null;
      const clickedInsideLocationCombobox = !!(clickTarget && clickTarget.closest("#miniV2LocationCombobox"));
      const clickedInsideFacetShell = !!(clickTarget && clickTarget.closest("#miniV2FacetShell"));
      const shouldCloseLocationMenu = state.locationMenuOpen && !clickedInsideLocationCombobox;

      if (shouldCloseLocationMenu) {
        state.locationMenuOpen = false;
        state.locationMenuSearch = "";
        renderLocationFilter();
      }

      if (state.openFacetKey && !clickedInsideFacetShell) {
        state.openFacetKey = "";
        renderFacetBar();
        renderFacetFlyout();
      }

      const actionButton = event.target.closest("button[data-action]");
      if (actionButton && root.contains(actionButton)) {
        event.stopPropagation();
        const action = actionButton.getAttribute("data-action");

        if (action === "toggle-facet") {
          const facetKey = actionButton.getAttribute("data-facet-key") || "";
          state.openFacetKey = state.openFacetKey === facetKey ? "" : facetKey;
          renderFacetBar();
          renderFacetFlyout();
          return;
        }

        if (action === "toggle-facet-value") {
          toggleAppliedFacetValue(
            actionButton.getAttribute("data-facet-kind") || "",
            actionButton.getAttribute("data-facet-value") || ""
          );
          renderAllPreservingScroll();
          return;
        }

        if (action === "toggle-facet-flag") {
          toggleAppliedFacetFlag(actionButton.getAttribute("data-facet-flag") || "");
          renderAllPreservingScroll();
          return;
        }

        if (action === "clear-open-facet") {
          clearOpenFacetSelections();
          renderAllPreservingScroll();
          return;
        }

        if (action === "toggle-location-menu") {
          state.locationMenuOpen = !state.locationMenuOpen;
          if (!state.locationMenuOpen) {
            state.locationMenuSearch = "";
          }
          renderLocationFilter();
          if (state.locationMenuOpen) {
            requestAnimationFrame(() => {
              locationSearchNode.focus();
              locationSearchNode.select();
            });
          }
          return;
        }

        if (action === "clear-location") {
          state.locationFilter = "all";
          state.locationMenuSearch = "";
          state.locationMenuOpen = false;
          renderAllPreservingScroll();
          return;
        }

        if (action === "set-location-filter") {
          state.locationFilter = actionButton.getAttribute("data-location-value") || "all";
          state.locationMenuSearch = "";
          state.locationMenuOpen = false;
          renderAllPreservingScroll();
          return;
        }

        if (action === "clear-filters") {
          state.search = "";
          state.locationFilter = "all";
          state.locationMenuSearch = "";
          state.locationMenuOpen = false;
          state.filtersApplied = createEmptyFilterState();
          state.openFacetKey = "";
          renderAllPreservingScroll();
          return;
        }

        if (action === "close-detail") {
          clearSelectedGroup();
          return;
        }

        if (action === "reset-changes") {
          resetSelectedDraftChanges();
          renderAllPreservingScroll();
          return;
        }

        if (action === "set-all-home") {
          stageSelectedCopiesHome();
          renderAllPreservingScroll();
          return;
        }

        if (action === "save-changes") {
          saveSelectedDraftChanges();
          renderAllPreservingScroll();
          return;
        }
      }

      const clickedRow = event.target.closest("tr[data-group-id]");
      if (clickedRow && root.contains(clickedRow)) {
        event.stopPropagation();
        const rootId = clickedRow.getAttribute("data-group-id");
        if (!rootId) return;
        if (rootId !== state.selectedRootId) {
          state.selectedRootId = rootId;
          renderAllPreservingScroll();
          return;
        }
        clearSelectedGroup();
      }
    }

    function handleRootInput(event) {
      if (event.target === searchInputNode) {
        state.search = searchInputNode.value;
        renderAllPreservingScroll();
        return;
      }

      if (event.target === locationSearchNode) {
        state.locationMenuSearch = locationSearchNode.value;
        renderLocationFilter();
        return;
      }

    }

    function handleRootChange(event) {
      const copySelect = event.target.closest("select[data-copy-id]");
      if (copySelect) {
        const group = getSelectedGroup();
        if (!group) return;
        const copy = group.copies.find(item => item.id === copySelect.getAttribute("data-copy-id"));
        if (!copy) return;

        const nextLocation = copySelect.value === "__RETURN_HOME__" ? copy.home : copySelect.value;
        if (nextLocation === copy.currentLocation) {
          delete state.draftLocations[copy.id];
        } else {
          state.draftLocations[copy.id] = nextLocation;
        }
        renderAllPreservingScroll();
      }
    }

    function handleRootKeydown(event) {
      if (event.key === "Escape" && state.openFacetKey) {
        const currentFacetKey = state.openFacetKey;
        state.openFacetKey = "";
        renderFacetBar();
        renderFacetFlyout();
        requestAnimationFrame(() => {
          const button = root.querySelector(`button[data-facet-key="${currentFacetKey}"]`);
          if (button instanceof HTMLElement) {
            button.focus();
          }
        });
        return;
      }

      if (event.key === "Escape" && state.locationMenuOpen) {
        state.locationMenuOpen = false;
        state.locationMenuSearch = "";
        renderLocationFilter();
        locationTriggerNode.focus();
        return;
      }

      if (event.target === locationTriggerNode && (event.key === "Enter" || event.key === " " || event.key === "ArrowDown")) {
        event.preventDefault();
        state.locationMenuOpen = true;
        renderLocationFilter();
        requestAnimationFrame(() => {
          locationSearchNode.focus();
          locationSearchNode.select();
        });
        return;
      }

      const row = event.target.closest("tr[data-group-id]");
      if (!row) return;
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        row.click();
      }
    }

    function handleDocumentClick(event) {
      const target = event && event.target;
      if (state.locationMenuOpen && target instanceof Element && !target.closest("#miniV2LocationCombobox")) {
        state.locationMenuOpen = false;
        state.locationMenuSearch = "";
        renderLocationFilter();
      }
      if (state.openFacetKey && target instanceof Element && !target.closest("#miniV2FacetShell")) {
        state.openFacetKey = "";
        renderFacetBar();
        renderFacetFlyout();
      }
      if (state.detailPointerDownInside) {
        state.detailPointerDownInside = false;
        return;
      }
      if (!root.classList.contains("mini-v2-has-detail")) return;
      if (isDetailPersistentClickTarget(target)) return;
      clearSelectedGroup();
    }

    function handleDocumentPointerDown(event) {
      const target = event && event.target;
      state.detailPointerDownInside = !!(target instanceof Element && target.closest("#miniV2DetailPanel"));
    }

    function isDetailPersistentClickTarget(target) {
      if (!target || !(target instanceof Element)) return false;
      if (target.closest("#miniV2DetailPanel")) return true;
      if (target.closest("#miniV2FacetShell")) return true;
      if (target.closest("tr[data-group-id]")) return true;
      if (target.closest(".mini-v2-top-card :is(button, input, select, textarea, a, label, [data-action])")) return true;
      if (target.closest(".mini-v2-controls :is(button, input, select, textarea, a, label, [data-action])")) return true;
      return false;
    }

    function captureScrollState() {
      const host = getPrimaryScrollHost();
      return {
        host: host,
        hostTop: host ? host.scrollTop : 0,
        hostLeft: host ? host.scrollLeft : 0,
        tableTop: tableScrollNode ? tableScrollNode.scrollTop : null,
        detailTop: detailScrollNode ? detailScrollNode.scrollTop : null
      };
    }

    function restoreScrollState(scrollState) {
      if (!scrollState) return;

      const apply = function () {
        const host = scrollState.host || getPrimaryScrollHost();
        if (host) {
          if (Math.abs((host.scrollTop || 0) - (scrollState.hostTop || 0)) > 1) {
            host.scrollTop = scrollState.hostTop || 0;
          }
          if (Math.abs((host.scrollLeft || 0) - (scrollState.hostLeft || 0)) > 1) {
            host.scrollLeft = scrollState.hostLeft || 0;
          }
        }

        if (tableScrollNode && scrollState.tableTop !== null) {
          tableScrollNode.scrollTop = scrollState.tableTop;
        }

        if (detailScrollNode && scrollState.detailTop !== null) {
          detailScrollNode.scrollTop = scrollState.detailTop;
        }
      };

      apply();
      requestAnimationFrame(apply);
    }

    function getPrimaryScrollHost() {
      return document.scrollingElement || document.documentElement || document.body;
    }

    function syncDesktopLayoutMetrics() {
      if (!desktopMq.matches) {
        root.style.removeProperty("--mini-v2-list-lock-width");
        return;
      }

      const workspaceWidth = workspaceNode ? workspaceNode.getBoundingClientRect().width : 0;
      const workspaceStyles = workspaceNode ? window.getComputedStyle(workspaceNode) : null;
      const workspaceGap = workspaceStyles
        ? parseFloat(workspaceStyles.columnGap || workspaceStyles.gap || "0") || 0
        : 0;
      const hasDetail = root.classList.contains("mini-v2-has-detail");
      const lockWidth = hasDetail ? Math.max(0, workspaceWidth - workspaceGap) : workspaceWidth;
      if (workspaceWidth > 0) {
        root.style.setProperty("--mini-v2-list-lock-width", `${Math.round(lockWidth)}px`);
      }
    }

    function getFilteredGroups(filterStateOverride) {
      const search = state.search.trim().toLowerCase();
      const filterState = filterStateOverride || state.filtersApplied;

      return state.groups.filter(group => {
        if (search && !group.searchText.includes(search)) return false;

        if (state.locationFilter !== "all") {
          const matchesLocation = group.home === state.locationFilter
            || group.copies.some(copy => {
              const effectiveLocation = state.draftLocations[copy.id] || copy.currentLocation;
              return effectiveLocation === state.locationFilter;
            });
          if (!matchesLocation) return false;
        }

        if (!matchesStructuredFilters(group, filterState)) return false;

        return true;
      });
    }

    function matchesStructuredFilters(group, filterState) {
      if (filterState.sizes.length && !filterState.sizes.includes(group.size || "n/a")) return false;
      if (filterState.creatureTypes.length && !filterState.creatureTypes.includes(group.creatureType || "n/a")) return false;
      if (filterState.roles.length && !filterState.roles.includes(group.role || "n/a")) return false;
      if (filterState.sexes.length && !filterState.sexes.includes(group.sex || "n/a")) return false;
      if (filterState.races.length && !filterState.races.includes(group.race || "n/a")) return false;
      if (filterState.paintedOnly && !group.paint) return false;
      if (filterState.needsStickersOnly && !group.needsStickers) return false;
      return true;
    }

    function createEmptyFilterState() {
      return {
        sizes: [],
        creatureTypes: [],
        roles: [],
        sexes: [],
        races: [],
        paintedOnly: false,
        needsStickersOnly: false
      };
    }

    function getSelectedGroup() {
      return state.groups.find(group => group.rootId === state.selectedRootId) || null;
    }

    function ensureSelectionVisibility() {
      if (!state.selectedRootId) return;
      const selectedStillVisible = getFilteredGroups().some(group => group.rootId === state.selectedRootId);
      if (!selectedStillVisible) {
        state.selectedRootId = "";
      }
    }

    function clearSelectedGroup() {
      if (!state.selectedRootId) return;
      state.selectedRootId = "";
      renderAllPreservingScroll();
    }

    function getEffectiveLocation(copy) {
      return state.draftLocations[copy.id] || copy.currentLocation;
    }

    function isDirty(copy) {
      return getEffectiveLocation(copy) !== copy.currentLocation;
    }

    function resetSelectedDraftChanges() {
      const group = getSelectedGroup();
      if (!group) return;
      group.copies.forEach(copy => {
        delete state.draftLocations[copy.id];
      });
    }

    function stageSelectedCopiesHome() {
      const group = getSelectedGroup();
      if (!group) return;
      group.copies.forEach(copy => {
        if (copy.currentLocation !== copy.home) {
          state.draftLocations[copy.id] = copy.home;
        }
      });
    }

    function saveSelectedDraftChanges() {
      const group = getSelectedGroup();
      if (!group) return;

      state.groups = state.groups.map(existingGroup => {
        if (existingGroup.rootId !== group.rootId) return existingGroup;

        const updatedCopies = existingGroup.copies.map(copy => {
          const nextLocation = state.draftLocations[copy.id];
          if (!nextLocation) return copy;
          return { ...copy, currentLocation: nextLocation };
        });

        return enrichGroup({ ...existingGroup, copies: updatedCopies });
      });

      group.copies.forEach(copy => {
        delete state.draftLocations[copy.id];
      });
    }

    function getStatusKey(group) {
      if (group.available === 0) return "checkedOut";
      if (group.available < group.total) return "partial";
      return "ready";
    }

    function getStatusLabel(group) {
      const status = getStatusKey(group);
      if (status === "checkedOut") return "Checked Out";
      if (status === "partial") return "Partial";
      return "Ready";
    }

    function statusClass(status) {
      if (status === "checkedOut") return "is-danger";
      if (status === "partial") return "is-warn";
      return "is-success";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  })();
</script>
