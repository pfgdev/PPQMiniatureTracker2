<style>
  :root {
    --page-width: 1280px;
    --page-background-color: #eef3f9;
    --border-color: #c7d5e5;
    --text-color: #18314f;
    --ppq-shell-max-width: 1248px;
    --ppq-shell-side-pad: 12px;
    --ppq-font-stack: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --ppq-text-primary: #18314f;
    --ppq-text-secondary: #5e7391;
    --ppq-surface-app: #eef3f9;
    --ppq-surface-panel: #fbfdff;
    --ppq-surface-panel-strong: #ffffff;
    --ppq-surface-header: #dbe8f2;
    --ppq-border-main: #c7d5e5;
    --ppq-border-soft: #d8e2ee;
    --ppq-section-header-color: #18314f;
    --ppq-section-header-bg: #eaf2f7;
    --ppq-section-header-size: 22px;
    --ppq-section-header-padding: 11px 16px;
    --v2-color-white: #fff;
    --v2-color-ink: #18314f;
    --v2-color-ink-soft: #18314f;
    --v2-color-muted: #5e7391;
    --v2-color-panel-top: #fbfdff;
    --v2-color-panel-bottom: #fbfdff;
    --v2-color-border: #c7d5e5;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--ppq-font-stack);
    font-size: 16px;
    background-color: var(--ppq-surface-app);
    padding: 0 16px 16px;
    text-align: center;
    color: var(--text-color);
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  #app {
    height: 100%;
    min-height: 0;
  }

  .v2-card {
    border: 1px solid var(--v2-card-border, var(--v2-color-border));
    border-radius: 12px;
    background: var(--v2-card-bg, var(--v2-color-panel-bottom));
    box-shadow: var(--v2-card-shadow, 0 1px 2px rgba(23, 42, 79, 0.08), 0 4px 12px rgba(23, 42, 79, 0.06));
    overflow: hidden;
  }

  .v2-card-header {
    font-size: 26px;
    font-weight: 700;
    color: var(--v2-card-header-color, var(--v2-color-ink-soft));
    text-align: left;
    padding: var(--v2-card-header-padding, 13px 18px);
    min-height: 56px;
    border-bottom: 1px solid var(--v2-card-border, var(--v2-color-border));
    background: var(--v2-card-header-bg, var(--ppq-surface-header));
    display: flex;
    align-items: center;
  }

  .v2-card-body {
    padding: var(--v2-card-body-padding, 16px 18px);
    text-align: left;
  }

  .mini-v2 {
    --mini-v2-gap: 16px;
    --mini-v2-control-height: 38px;
    --mini-v2-action-height: 32px;
    --mini-v2-row-gap: 6px;
    --mini-v2-section-gap: 14px;
    --mini-v2-detail-rhythm-gap: 8px;
    --mini-v2-label-height: 14px;
    --mini-v2-ink: #18314f;
    --mini-v2-muted: #5e7391;
    --mini-v2-edge: #c7d5e5;
    --mini-v2-edge-soft: #d8e2ee;
    --mini-v2-primary: #3f6fcc;
    --mini-v2-primary-dark: #315db2;
    --mini-v2-secondary: #e9f0f8;
    --mini-v2-secondary-dark: #dfe8f4;
    --mini-v2-danger: #d25a5a;
    --mini-v2-danger-dark: #b64747;
    --mini-v2-success-bg: #ddefd8;
    --mini-v2-success-edge: #b9d9b0;
    --mini-v2-success-ink: #2f6a3a;
    --mini-v2-warn-bg: #f7e4b5;
    --mini-v2-warn-edge: #e8cb7e;
    --mini-v2-warn-ink: #8b6400;
    --mini-v2-danger-bg: #f4d7d7;
    --mini-v2-danger-edge: #e6b7b7;
    --mini-v2-danger-ink: #8f2d2d;
    --mini-v2-attention-bg: #e9ddf6;
    --mini-v2-attention-edge: #d0b7ee;
    --mini-v2-attention-ink: #6b4793;
    --mini-v2-scroll-base: clamp(420px, 62vh, 760px);
    --mini-v2-scroll-list-offset: 0px;
    --mini-v2-scroll-detail-offset: 0px;
    --mini-v2-scroll-list-max: calc(var(--mini-v2-scroll-base) + var(--mini-v2-scroll-list-offset));
    --mini-v2-scroll-detail-max: calc(var(--mini-v2-scroll-base) + var(--mini-v2-scroll-detail-offset));
    --mini-v2-detail-panel-width: clamp(620px, 72vw, 760px);
    --mini-v2-list-lock-width: 100%;
    max-width: var(--ppq-shell-max-width);
    height: 100%;
    min-height: 0;
    margin: 0 auto;
    padding: 12px var(--ppq-shell-side-pad) 16px;
    color: var(--mini-v2-ink);
    text-align: left;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    gap: 16px;
  }

  .mini-v2 .v2-card {
    border-color: var(--mini-v2-edge);
    background: var(--ppq-surface-panel);
    box-shadow: 0 1px 2px rgba(23, 42, 79, 0.08), 0 4px 12px rgba(23, 42, 79, 0.06);
  }

  .mini-v2 .v2-card-header {
    color: var(--ppq-section-header-color);
    background: var(--ppq-section-header-bg);
    font-size: var(--ppq-section-header-size);
    padding: var(--ppq-section-header-padding);
  }

  .mini-v2-top-card {
    overflow: hidden;
  }

  .mini-v2-top-card-body {
    min-height: 56px;
    padding-top: 12px;
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .mini-v2-top-note {
    color: var(--ppq-text-secondary);
    font-size: 13px;
    line-height: 1.45;
    margin-right: auto;
  }

  .mini-v2-top-layout {
    display: grid;
    grid-template-columns: minmax(280px, 0.53fr) minmax(260px, 0.47fr);
    gap: var(--mini-v2-gap);
    align-items: start;
  }

  .mini-v2-title-block {
    display: grid;
    gap: 6px;
  }

  .mini-v2-kicker,
  .mini-v2-chip,
  .mini-v2-badge,
  .mini-v2-list-filter-label,
  .mini-v2-field-label,
  .mini-v2-table th,
  .mini-v2-stat-label,
  .mini-v2-detail-tag,
  .mini-v2-copy-title,
  .mini-v2-note-label {
    color: var(--mini-v2-muted);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: var(--mini-v2-label-height);
  }

  .mini-v2-kicker {
    color: #4d628c;
  }

  .mini-v2-hero {
    font-size: 34px;
    line-height: 1.03;
    color: var(--mini-v2-ink);
  }

  .mini-v2-subtitle {
    color: #5f7090;
    font-size: 13px;
    line-height: 1.5;
    max-width: 46rem;
  }

  .mini-v2-summary-lane {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: flex-end;
    align-content: start;
  }

  .mini-v2-chip,
  .mini-v2-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    white-space: nowrap;
  }

  .mini-v2-chip {
    min-height: var(--mini-v2-action-height);
    padding: 6px 12px;
    border: 1px solid var(--ppq-border-main);
    background: var(--mini-v2-secondary);
    color: #27446b;
  }

  .mini-v2-chip.is-primary {
    background: #dbe7fb;
    border-color: #b8cae3;
    color: #27446b;
  }

  .mini-v2-chip.is-success,
  .mini-v2-badge.is-success {
    background: var(--mini-v2-success-bg);
    border-color: var(--mini-v2-success-edge);
    color: var(--mini-v2-success-ink);
  }

  .mini-v2-chip.is-warn,
  .mini-v2-badge.is-warn {
    background: var(--mini-v2-warn-bg);
    border-color: var(--mini-v2-warn-edge);
    color: var(--mini-v2-warn-ink);
  }

  .mini-v2-chip.is-danger,
  .mini-v2-badge.is-danger {
    background: var(--mini-v2-danger-bg);
    border-color: var(--mini-v2-danger-edge);
    color: var(--mini-v2-danger-ink);
  }

  .mini-v2-badge {
    min-height: 24px;
    padding: 4px 8px;
    border: 1px solid transparent;
    font-size: 11px;
    letter-spacing: 0.04em;
  }

  .button {
    border: 1px solid var(--ppq-border-main);
    border-radius: 10px;
    background: var(--mini-v2-secondary);
    color: #27446b;
    cursor: pointer;
    transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, box-shadow 120ms ease;
    box-shadow: 0 1px 2px rgba(23, 42, 79, 0.08), 0 4px 12px rgba(23, 42, 79, 0.06);
  }

  .button:hover {
    background: #dfe8ff;
  }

  .button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    filter: saturate(0.75);
  }

  .mini-v2-primary {
    background: var(--mini-v2-primary);
    border-color: var(--mini-v2-primary);
    color: #fff;
  }

  .mini-v2-primary:hover {
    background: var(--mini-v2-primary-dark);
    border-color: var(--mini-v2-primary-dark);
  }

  .mini-v2-secondary {
    background: var(--mini-v2-secondary);
    color: #2e4369;
    border-color: #bfd0ec;
  }

  .mini-v2-secondary:hover {
    background: var(--mini-v2-secondary-dark);
  }

  .mini-v2-workspace {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--mini-v2-gap);
    align-items: start;
    overflow: hidden;
    min-height: 0;
  }

  .mini-v2-table-card,
  .mini-v2-detail-card {
    min-width: 0;
    min-height: 0;
  }

  .mini-v2-list-stage {
    width: 100%;
    height: 100%;
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
  }

  .mini-v2-detail-stage {
    width: 100%;
    height: 100%;
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
  }

  .mini-v2-list-header,
  .mini-v2-detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .mini-v2-list-header span,
  #miniV2DetailHeaderTitle {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mini-v2-list-header-note {
    color: #5b6b86;
    font-size: 13px;
    font-weight: 700;
  }

  .mini-v2-table-body {
    padding-top: 12px;
    padding-bottom: 12px;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    height: 100%;
    min-width: 0;
    min-height: 0;
  }

  .mini-v2-controls {
    display: grid;
    gap: 8px;
    margin-bottom: 8px;
    min-width: 0;
    position: relative;
  }

  .mini-v2-search-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 196px max-content;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .mini-v2-facet-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    min-width: 0;
  }

  .mini-v2-facet-shell {
    position: relative;
    min-width: 0;
  }

  .mini-v2-facet-shell.has-open-facet {
    z-index: 18;
  }

  .mini-v2-facet-btn {
    border: 1px solid #9eb8da;
    border-radius: 999px;
    background: #f8fbfe;
    color: #35537c;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    min-height: 30px;
    height: 30px;
    min-width: 0;
    padding: 0 11px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition:
      background 120ms ease,
      border-color 120ms ease,
      color 120ms ease,
      box-shadow 120ms ease,
      transform 120ms ease;
  }

  .mini-v2-facet-btn:hover {
    background: #edf4ff;
    border-color: #7f99c7;
  }

  .mini-v2-facet-btn.is-active {
    background: #e6eef9;
    border-color: #7f9fcd;
    color: #27446b;
    box-shadow: 0 1px 2px rgba(23, 42, 79, 0.08), 0 3px 10px rgba(23, 42, 79, 0.06);
  }

  .mini-v2-facet-btn.is-open {
    background: #dce8fb;
    border-color: #4e7fca;
    color: #18314f;
    box-shadow: 0 0 0 2px rgba(63, 111, 204, 0.12);
    transform: translateY(1px);
  }

  .mini-v2-facet-label {
    min-width: 0;
  }

  .mini-v2-facet-count {
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 999px;
    background: rgba(24, 49, 79, 0.12);
    color: inherit;
    font-size: 11px;
    font-weight: 700;
    line-height: 18px;
    text-align: center;
    flex: 0 0 auto;
  }

  .mini-v2-facet-popover {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    z-index: 24;
    width: min(420px, calc(100% - 2px));
    max-width: 420px;
    max-height: min(72vh, 460px);
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    border: 1px solid var(--ppq-border-main);
    border-radius: 12px;
    background: var(--ppq-surface-panel);
    box-shadow: 0 10px 28px rgba(23, 42, 79, 0.18), 0 3px 10px rgba(23, 42, 79, 0.08);
    overflow: hidden;
    opacity: 0;
    transform: translateY(-6px) scale(0.985);
    transform-origin: top left;
    pointer-events: none;
    transition:
      opacity 140ms ease,
      transform 180ms cubic-bezier(.2, .8, .2, 1);
  }

  .mini-v2-facet-popover[hidden] {
    display: none !important;
  }

  .mini-v2-facet-popover.is-visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .mini-v2-facet-popover-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px;
    border-bottom: 1px solid #e2e9f5;
  }

  .mini-v2-facet-popover-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--mini-v2-ink);
    line-height: 1.2;
  }

  .mini-v2-facet-popover-link {
    min-height: auto;
    height: auto;
    padding: 0;
    border: none;
    background: transparent;
    color: #35537c;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.2;
    box-shadow: none;
  }

  .mini-v2-facet-popover-link[disabled] {
    opacity: 0.45;
    cursor: default;
  }

  .mini-v2-facet-popover-body {
    padding: 12px;
    min-height: 0;
    overflow-y: auto;
    display: grid;
    gap: 12px;
  }

  .mini-v2-facet-group,
  .mini-v2-facet-more {
    display: grid;
    gap: 8px;
  }

  .mini-v2-facet-group-label {
    color: var(--mini-v2-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1;
    text-transform: uppercase;
  }

  .mini-v2-facet-tile-grid {
    display: grid;
    gap: 8px;
  }

  .mini-v2-facet-tile-grid.is-three-col {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .mini-v2-facet-tile-grid.is-two-col {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .mini-v2-facet-tile {
    min-height: 32px;
    border: 1px solid #9cb9e1;
    border-radius: 8px;
    background: #ffffff;
    color: #27446b;
    font: inherit;
    padding: 0 10px;
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    text-align: left;
    cursor: pointer;
    transition:
      background 120ms ease,
      border-color 120ms ease,
      color 120ms ease,
      box-shadow 120ms ease;
  }

  .mini-v2-facet-tile:hover {
    background: #f4f8fd;
    border-color: #7f99c7;
  }

  .mini-v2-facet-tile.is-selected {
    background: #dcebff;
    border: 2px solid #4e7fca;
    color: #18314f;
    padding-left: 9px;
    padding-right: 9px;
  }

  .mini-v2-facet-tile-check {
    width: 14px;
    height: 14px;
    border: 1px solid #b6c9e6;
    border-radius: 4px;
    background: #ffffff;
    color: transparent;
    font-size: 10px;
    font-weight: 700;
    line-height: 12px;
    text-align: center;
    flex: 0 0 auto;
  }

  .mini-v2-facet-tile.is-selected .mini-v2-facet-tile-check {
    border-color: #4e7fca;
    background: #f7fbff;
    color: #315db2;
  }

  .mini-v2-facet-tile-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
  }

  .mini-v2-field {
    display: flex;
    flex-direction: column;
    text-align: left;
    gap: 6px;
    min-width: 0;
  }

  .mini-v2-field input,
  .mini-v2-field select,
  .mini-v2-combobox-trigger,
  .mini-v2-combobox-search,
  .mini-v2-copy-select {
    border: 1px solid var(--ppq-border-main);
    border-radius: 10px;
    background: var(--ppq-surface-panel-strong);
    color: #24314a;
    padding: 9px 10px;
    font-size: 14px;
    font-family: var(--ppq-font-stack);
  }

  .mini-v2-search-row > .mini-v2-field input,
  .mini-v2-search-row > .mini-v2-field select,
  .mini-v2-combobox-trigger {
    min-height: 44px;
    height: 44px;
    padding: 0 12px;
    line-height: 1.2;
    font-size: 13px;
  }

  .mini-v2-search-row .mini-v2-combobox-trigger {
    font-size: 12px;
  }

  .mini-v2-field input:focus,
  .mini-v2-field select:focus,
  .mini-v2-combobox-trigger:focus,
  .mini-v2-combobox-search:focus,
  .mini-v2-copy-select:focus {
    outline: 2px solid rgba(63, 111, 204, 0.22);
    border-color: #6f90ca;
  }

  .mini-v2-combobox {
    position: relative;
    min-width: 0;
  }

  .mini-v2-combobox-trigger {
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    cursor: pointer;
    text-align: left;
    color: #24314a;
    background: var(--ppq-surface-panel-strong);
    position: relative;
    padding-right: 32px;
  }

  .mini-v2-combobox-trigger.is-active {
    border-color: #9eb8da;
  }

  .mini-v2-combobox-trigger.is-open {
    border-color: #6f90ca;
    box-shadow: 0 0 0 2px rgba(63, 111, 204, 0.12);
  }

  .mini-v2-combobox-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mini-v2-combobox-caret {
    position: absolute;
    top: 50%;
    right: 12px;
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid var(--mini-v2-muted);
    transform: translateY(-35%);
    pointer-events: none;
  }

  .mini-v2-combobox-clear {
    position: absolute;
    top: 50%;
    right: 28px;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    border: none;
    border-radius: 999px;
    background: transparent;
    color: var(--mini-v2-muted);
    font-size: 12px;
    font-weight: 700;
    line-height: 18px;
    padding: 0;
    cursor: pointer;
    text-transform: uppercase;
  }

  .mini-v2-combobox-clear:hover {
    background: rgba(233, 240, 248, 0.95);
    color: #27446b;
  }

  .mini-v2-combobox-popover {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    z-index: 30;
    width: 100%;
    min-width: 196px;
    max-height: min(72vh, 360px);
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    border: 1px solid var(--ppq-border-main);
    border-radius: 12px;
    background: var(--ppq-surface-panel);
    box-shadow: 0 8px 24px rgba(23, 42, 79, 0.16), 0 2px 8px rgba(23, 42, 79, 0.08);
    overflow: hidden;
  }

  .mini-v2-combobox-popover[hidden] {
    display: none !important;
  }

  .mini-v2-combobox-search-wrap {
    padding: 10px;
    border-bottom: 1px solid #e2e9f5;
    background: var(--ppq-surface-panel-strong);
  }

  .mini-v2-combobox-search {
    width: 100%;
